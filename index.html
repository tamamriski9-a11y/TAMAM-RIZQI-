<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Data Diriku</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #bbf7d0, #bae6fd);
            margin: 0;
            padding: 20px;
        }

        .container {
            background: white;
            max-width: 800px;
            margin: auto;
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 0 20px rgba(0,0,0,0.2);
            border: 5px solid #22c55e;
        }

        h1 {
            text-align: center;
            color: #0284c7;
            font-size: 40px;
        }

        .photo {
            text-align: center;
            margin-bottom: 30px;
        }

        .photo img {
            width: 250px;
            height: 250px;
            object-fit: cover;
            border-radius: 20px;
            border: 6px solid #22c55e;
        }

        .field {
            margin-bottom: 20px;
        }

        .label {
            display: inline-block;
            background: #22c55e;
            color: white;
            padding: 8px 20px;
            border-radius: 20px;
            font-weight: bold;
        }

        .box {
            margin-top: 8px;
            border: 3px solid #38bdf8;
            border-radius: 15px;
            padding: 15px;
            font-size: 18px;
            color: #444;
        }

        a {
            color: #0284c7;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>DATA DIRIKU</h1>

    <div class="photo">
        <img src="tamam.jpg" alt="Foto Profil">
    </div>

    <div class="field">
        <div class="label">Nama Lengkap</div>
        <div class="box">TAMAM RIZQI</div>
    </div>

    <div class="field">
        <div class="label">Kelas</div>
        <div class="box">XII TJKT 1</div>
    </div>

    <div class="field">
        <div class="label">Hobi</div>
        <div class="box">BERMAIN BOLA</div>
    </div>

    <div class="field">
        <div class="label">Cita-cita</div>
        <div class="box">MASINIS</div>
    </div>

    <div class="field">
        <div class="label">Instagram</div>
        <div class="box">
            <a href="https://instagram.com/rizzz4u_" target="_blank">@rizzz4u_</a>
        </div>
    </div>

</div>

</body>
</html>
